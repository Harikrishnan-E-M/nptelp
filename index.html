<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>CSE - NPTEL Details</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

<style>
/* ================= YOUR DESIGN (UNCHANGED) ================= */
body { background-color:#f8fafc; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; }
.page-title{font-weight:700;letter-spacing:.04em;color:#1a56db;border-bottom:3px solid #1a56db;padding-bottom:10px;margin-bottom:25px}
.card{border-radius:12px;border:none;box-shadow:0 4px 6px rgba(0,0,0,.05),0 1px 3px rgba(0,0,0,.1)}
.table thead th{background:#1a56db;color:#fff;position:sticky;top:0}
.upload-area{border:2px dashed #d1d5db;border-radius:8px;padding:20px;text-align:center;cursor:pointer}
.upload-area:hover{border-color:#1a56db;background:#f0f9ff}
.table-container{max-height:600px;overflow-y:auto}
.badge-status{padding:4px 10px;border-radius:20px;font-size:.8rem}
.status-success{background:#d1fae5;color:#065f46}
.status-pending{background:#fef3c7;color:#92400e}
.status-rejected{background:#fee2e2;color:#991b1b}
.status-na{background:#e5e7eb;color:#4b5563}
</style>
</head>

<body>
<div class="container py-4">

<h2 class="page-title mb-4">
<i class="bi bi-award-fill me-2"></i>CSE - NPTEL Details
</h2>

<!-- ================= UPLOAD & FILTERS ================= -->
<div class="card shadow-sm mb-4">
<div class="card-body">

<div class="upload-area mb-2" id="uploadArea">
<input type="file" id="csvFile" accept=".csv" class="d-none">
<i class="bi bi-cloud-arrow-up-fill fs-1 text-primary"></i>
<p class="mb-0">Click or Drop CSV file here</p>
</div>

<!-- ✅ FILE UPLOADED INFO -->
<div id="uploadInfo" class="alert alert-success d-none p-2">
<i class="bi bi-check-circle-fill me-2"></i>
<span id="uploadedFileName"></span>
</div>

<div class="row g-3 align-items-end">
<div class="col-md-3">
<label class="form-label">Batch</label>
<select id="batchSelect" class="form-select">
<option value="all">All Batches</option>
</select>
</div>

<div class="col-md-2">
<label class="form-label">Semester</label>
<select id="semSelect" class="form-select">
<option value="all">All Semesters</option>
</select>
</div>

<div class="col-md-4">
<label class="form-label">Search</label>
<input id="searchInput" class="form-control" placeholder="Name, Reg No, Course">
</div>

<div class="col-md-3 d-flex gap-2">
<button id="resetBtn" class="btn btn-outline-secondary w-100">Reset</button>
<button id="statsBtn" class="btn btn-primary w-100">Statistics</button>
</div>
</div>

</div>
</div>

<!-- ================= TABLE ================= -->
<div class="card">
<div class="card-body p-0">
<div class="table-container">
<table class="table table-bordered table-striped align-middle" id="nptelTable">
<thead>
<tr>
<th>#</th>
<th>Batch</th>
<th>Reg No</th>
<th>Name</th>
<th>Sem</th>
<th>Course Code</th>
<th>Course Title</th>
<th>Credit</th>
<th>Score</th>
<th>Exam</th>
<th>Cert ID</th>
<th>Proof</th>
<th>Status</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>
</div>
</div>

</div>

<script>
/* ================= DOM ================= */
const csvInput = document.getElementById("csvFile");
const uploadArea = document.getElementById("uploadArea");
const uploadInfo = document.getElementById("uploadInfo");
const uploadedFileName = document.getElementById("uploadedFileName");

const batchSelect = document.getElementById("batchSelect");
const semSelect = document.getElementById("semSelect");
const searchInput = document.getElementById("searchInput");
const resetBtn = document.getElementById("resetBtn");
const statsBtn = document.getElementById("statsBtn");
const tbody = document.querySelector("#nptelTable tbody");

let data = [];

/* ================= UPLOAD ================= */
uploadArea.onclick = () => csvInput.click();

csvInput.onchange = e => {
const file = e.target.files[0];
if (!file) return;

const reader = new FileReader();
reader.onload = ev => {
data = parseCsv(ev.target.result);
localStorage.setItem("nptelData", JSON.stringify(data));
localStorage.setItem("uploadedFileName", file.name);

/* ✅ SHOW UPLOADED FILE */
uploadedFileName.textContent = `File uploaded: ${file.name}`;
uploadInfo.classList.remove("d-none");

initFilters();
render();
};
reader.readAsText(file);
};

/* ================= CSV PARSER (UNCHANGED) ================= */
function parseCsv(csvText) {
const lines = csvText.split(/\r?\n/);
lines.shift();
const rows = [];
for (let line of lines) {
if (!line.trim()) continue;
const cols=[]; let cur=""; let q=false;
for (let ch of line){
if(ch==='"') q=!q;
else if(ch===','&&!q){cols.push(cur.trim());cur="";}
else cur+=ch;
}
cols.push(cur.trim());
const regNo=cols[4], name=cols[5], courseTitle=cols[8], score=cols[10];
if(!regNo||!name||!courseTitle||!score) continue;
const year=/^\d{4}$/.test(cols[2])?Number(cols[2]):null;
let proofUrl=(cols[17]||"").replace(/^"+|"+$/g,"").trim();
rows.push({
batch:year?`${year}-${year+4}`:"",
regNo,name,sem:(cols[6]||"").trim(),
courseCode:cols[7]||"",
courseTitle,credit:cols[9]||"",
score,examMonth:cols[12]||"",
examYear:cols[13]||"",
certId:cols[14]||"",
proofUrl,status:cols[20]||""
});
}
return rows;
}

/* ================= FILTERS ================= */
function initFilters(){
batchSelect.innerHTML='<option value="all">All Batches</option>';
[...new Set(data.map(r=>r.batch))].filter(Boolean).sort()
.forEach(b=>batchSelect.add(new Option(b,b)));
initSemesters();
}
function initSemesters(){
semSelect.innerHTML='<option value="all">All Semesters</option>';
[...new Set(data.filter(r=>batchSelect.value==="all"||r.batch===batchSelect.value)
.map(r=>r.sem).filter(Boolean))]
.sort().forEach(s=>semSelect.add(new Option(s,s)));
}

/* ================= RENDER ================= */
function render(){
tbody.innerHTML="";
const q=searchInput.value.toLowerCase();
data.filter(r=>
(batchSelect.value==="all"||r.batch===batchSelect.value)&&
(semSelect.value==="all"||r.sem===semSelect.value)&&
`${r.regNo} ${r.name} ${r.courseTitle}`.toLowerCase().includes(q)
).forEach((r,i)=>{
tbody.insertAdjacentHTML("beforeend",`
<tr>
<td>${i+1}</td><td>${r.batch}</td><td>${r.regNo}</td>
<td>${r.name}</td><td>${r.sem}</td>
<td>${r.courseCode}</td><td>${r.courseTitle}</td>
<td>${r.credit}</td><td>${r.score}</td>
<td>${r.examMonth} ${r.examYear}</td>
<td>${r.certId}</td>
<td>${r.proofUrl?`<a href="${r.proofUrl}" target="_blank">View</a>`:"NA"}</td>
<td><span class="badge-status status-na">${r.status||"NA"}</span></td>
</tr>`);
});
}

/* ================= EVENTS ================= */
batchSelect.onchange=()=>{initSemesters();render();};
semSelect.onchange=render;
searchInput.oninput=render;
resetBtn.onclick=()=>{batchSelect.value=semSelect.value="all";searchInput.value="";render();};

statsBtn.onclick=()=>{
if(!data.length){alert("Upload CSV first");return;}
window.location.href="statistics.html";
};

/* ================= RESTORE ================= */
document.addEventListener("DOMContentLoaded",()=>{
const saved=localStorage.getItem("nptelData");
const savedFile=localStorage.getItem("uploadedFileName");
if(saved){
data=JSON.parse(saved);
initFilters();render();
if(savedFile){
uploadedFileName.textContent=`File uploaded: ${savedFile}`;
uploadInfo.classList.remove("d-none");
}
}
});
</script>

</body>
</html>
